{{define "cost-plan-drawer-form"}}
<form method="POST" action="{{.FormAction}}">
  {{if .IsEdit}}<input type="hidden" name="id" value="{{.ID}}">{{end}}
  <div class="form-section">
    <div class="form-group">
      <label>{{.Labels.Name}}</label>
      <input type="text" name="name" value="{{.Name}}" placeholder="{{.Labels.NamePlaceholder}}">
    </div>
    <div class="form-group">
      <label>{{.Labels.Description}}</label>
      <textarea name="description" placeholder="{{.Labels.DescPlaceholder}}">{{.Description}}</textarea>
    </div>
  </div>
  <div class="form-section">
    <div class="form-group">
      <label>{{.Labels.SupplierPlan}}</label>
      <input type="hidden" name="supplier_plan_id" value="{{.SupplierPlanID}}">
      <input type="text" placeholder="{{.Labels.SupplierPlanPlaceholder}}" value="{{.SupplierPlanLabel}}"
             data-autocomplete-url="{{.SearchSupplierPlanURL}}"
             data-autocomplete-target="supplier_plan_id">
    </div>
    <div class="form-group">
      <label>{{.Labels.CostSchedule}}</label>
      <input type="hidden" name="cost_schedule_id" value="{{.CostScheduleID}}">
      <input type="text" placeholder="{{.Labels.CostSchedulePlaceholder}}" value="{{.CostScheduleLabel}}"
             data-autocomplete-url="{{.SearchCostScheduleURL}}"
             data-autocomplete-target="cost_schedule_id">
    </div>
  </div>
  <div class="form-section">
    <div class="form-group">
      <label>{{.Labels.BillingKind}}</label>
      <select name="billing_kind">
        <option value="COST_PLAN_BILLING_KIND_ONE_TIME" {{if eq .BillingKind "COST_PLAN_BILLING_KIND_ONE_TIME"}}selected{{end}}>{{.Labels.BillingKindOneTime}}</option>
        <option value="COST_PLAN_BILLING_KIND_RECURRING" {{if eq .BillingKind "COST_PLAN_BILLING_KIND_RECURRING"}}selected{{end}}>{{.Labels.BillingKindRecurring}}</option>
        <option value="COST_PLAN_BILLING_KIND_CONTRACT" {{if eq .BillingKind "COST_PLAN_BILLING_KIND_CONTRACT"}}selected{{end}}>{{.Labels.BillingKindContract}}</option>
        <option value="COST_PLAN_BILLING_KIND_USAGE_BASED" {{if eq .BillingKind "COST_PLAN_BILLING_KIND_USAGE_BASED"}}selected{{end}}>{{.Labels.BillingKindUsageBased}}</option>
        <option value="COST_PLAN_BILLING_KIND_AD_HOC" {{if eq .BillingKind "COST_PLAN_BILLING_KIND_AD_HOC"}}selected{{end}}>{{.Labels.BillingKindAdHoc}}</option>
      </select>
    </div>
    <div class="form-group">
      <label>{{.Labels.AmountBasis}}</label>
      <select name="amount_basis">
        <option value="COST_PLAN_AMOUNT_BASIS_PER_CYCLE" {{if eq .AmountBasis "COST_PLAN_AMOUNT_BASIS_PER_CYCLE"}}selected{{end}}>{{.Labels.AmountBasisPerCycle}}</option>
        <option value="COST_PLAN_AMOUNT_BASIS_TOTAL_PACKAGE" {{if eq .AmountBasis "COST_PLAN_AMOUNT_BASIS_TOTAL_PACKAGE"}}selected{{end}}>{{.Labels.AmountBasisTotalPackage}}</option>
        <option value="COST_PLAN_AMOUNT_BASIS_DERIVED_FROM_LINES" {{if eq .AmountBasis "COST_PLAN_AMOUNT_BASIS_DERIVED_FROM_LINES"}}selected{{end}}>{{.Labels.AmountBasisDerivedFromLines}}</option>
        <option value="COST_PLAN_AMOUNT_BASIS_PER_OCCURRENCE" {{if eq .AmountBasis "COST_PLAN_AMOUNT_BASIS_PER_OCCURRENCE"}}selected{{end}}>{{.Labels.AmountBasisPerOccurrence}}</option>
      </select>
    </div>
    <div class="form-group">
      <label>{{.Labels.Amount}}</label>
      <input type="text" name="amount" value="{{.Amount}}" placeholder="{{.Labels.AmountPlaceholder}}">
    </div>
    <div class="form-group">
      <label>{{.Labels.Currency}}</label>
      <input type="text" name="currency" value="{{.Currency}}" placeholder="{{.Labels.CurrencyPlaceholder}}">
    </div>
  </div>
  {{if .IsEdit}}
  <div class="form-section">
    <label>
      <input type="checkbox" name="active" value="true" {{if .Active}}checked{{end}}>
      {{.Labels.Active}}
    </label>
  </div>
  {{end}}
  <div class="form-actions">
    <button type="submit">Save</button>
  </div>
</form>
{{end}}
