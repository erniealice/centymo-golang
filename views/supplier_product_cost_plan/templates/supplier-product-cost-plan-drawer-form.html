{{define "supplier-product-cost-plan-drawer-form"}}
<form method="POST" action="{{.FormAction}}">
  {{if .IsEdit}}<input type="hidden" name="id" value="{{.ID}}">{{end}}
  <input type="hidden" name="cost_plan_id" value="{{.CostPlanID}}">
  <div class="form-section">
    <div class="form-group">
      <label>{{.Labels.SupplierProductPlan}}</label>
      <input type="hidden" name="supplier_product_plan_id" value="{{.SupplierProductPlanID}}">
      <input type="text" placeholder="{{.Labels.SupplierProductPlanPlaceholder}}" value="{{.SupplierProductPlanLabel}}"
             data-autocomplete-url="{{.SearchSupplierProductPlanURL}}"
             data-autocomplete-target="supplier_product_plan_id">
    </div>
  </div>
  <div class="form-section">
    <div class="form-group">
      <label>{{.Labels.BillingTreatment}}</label>
      <select name="billing_treatment">
        <option value="SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_RECURRING" {{if eq .BillingTreatment "SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_RECURRING"}}selected{{end}}>{{.Labels.TreatmentRecurring}}</option>
        <option value="SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_ONE_TIME_INITIAL" {{if eq .BillingTreatment "SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_ONE_TIME_INITIAL"}}selected{{end}}>{{.Labels.TreatmentOneTimeInitial}}</option>
        <option value="SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_USAGE_BASED" {{if eq .BillingTreatment "SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_USAGE_BASED"}}selected{{end}}>{{.Labels.TreatmentUsageBased}}</option>
        <option value="SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_MINIMUM_COMMITMENT" {{if eq .BillingTreatment "SUPPLIER_PRODUCT_COST_PLAN_BILLING_TREATMENT_MINIMUM_COMMITMENT"}}selected{{end}}>{{.Labels.TreatmentMinimumCommitment}}</option>
      </select>
    </div>
    <div class="form-group">
      <label>{{.Labels.Amount}}</label>
      <input type="text" name="amount" value="{{.Amount}}" placeholder="{{.Labels.AmountPlaceholder}}">
    </div>
  </div>
  {{if .IsEdit}}
  <div class="form-section">
    <label>
      <input type="checkbox" name="active" value="true" {{if .Active}}checked{{end}}>
      {{.Labels.Active}}
    </label>
  </div>
  {{end}}
  <div class="form-actions">
    <button type="submit">Save</button>
  </div>
</form>
{{end}}
